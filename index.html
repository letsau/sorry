<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body{
  margin:0;height:100vh;overflow:hidden;
  display:flex;justify-content:center;align-items:center;
  text-align:center;color:white;
  font-family:'Georgia','Segoe UI',serif;

  background: linear-gradient(270deg,#1a001f,#6a0f3c,#ff4d6d,#ff7eb3);
  background-size:400% 400%;
  animation:bg 15s infinite;
}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.glow{
position:fixed;width:100%;height:100%;
background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 60%);
animation:pulse 4s infinite;
}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}

.img{
position:absolute;width:130px;border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.5);
animation:float 6s infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

.container{z-index:2;max-width:700px}

h1{font-size:40px;text-shadow:0 0 25px white}
p{line-height:1.8;font-size:18px}

button{
margin-top:25px;padding:15px 30px;border:none;
border-radius:30px;background:#ff4d6d;color:white;
cursor:pointer;
}

.fadeOut{opacity:0;transform:scale(1.05);transition:0.7s}
</style>
</head>

<body>

<audio autoplay loop>
<source src="music.mp3">
</audio>

<div class="glow"></div>

<img src="img 1.jpg" class="img" style="top:10%;left:5%">
<img src="img 2.jpg" class="img" style="bottom:10%;right:5%">

<div class="container">
<h1>This is for you… ❤️</h1>

<p>
I didn’t want to just send a message…  
because some things deserve more than just words.

So I made this… slowly… thinking about you the whole time.

Just… stay for a minute.
</p>

<button onclick="goNext('page2.html')">Start</button>
</div>

<script>
function goNext(page){
document.body.classList.add("fadeOut");
setTimeout(()=>{window.location.href=page},700);
}
</script>

</body>
</html>
