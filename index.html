<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Us</title>
<style>

body{margin:0;height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;text-align:center;color:white;font-family:'Georgia','Segoe UI',serif;background: linear-gradient(270deg,#1a001f,#ff4d6d,#ff7eb3);background-size:400% 400%;animation:bg 15s infinite;}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.glow{position:fixed;width:100%;height:100%;background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 60%);animation:pulse 4s infinite;}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}

.img{
position:absolute;
width:220px;
height:220px; /* added height */
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.5);
object-fit:cover; /* keeps image nice */
animation:float 6s infinite;
}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

.container{z-index:2;max-width:700px}

button{margin-top:20px;padding:15px 30px;border:none;border-radius:30px;background:#ff4d6d;color:white}

.fadeOut{opacity:0;transform:scale(1.05);transition:0.7s}

</style>
</head>

<body>

<audio autoplay loop><source src="music.mp3"></audio>

<div class="glow"></div>

<img src="img 3.jpg" class="img" style="top:10%;right:5%">
<img src="img 4.jpg" class="img" style="bottom:10%;left:5%">

<div class="container">
<h1>You & Me ❤️</h1>

<p>
Every small moment with you… meant more than I ever said.

Even the random conversations…  
even the silence…

it all felt right with you.
</p>

<button onclick="goNext('page2.html')">Next</button>
</div>

<script>
function goNext(page){
document.body.classList.add("fadeOut");
setTimeout(()=>{window.location.href=page},700);
}
</script>

</body>
</html>
